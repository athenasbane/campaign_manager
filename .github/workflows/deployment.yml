# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  pull_request:
    types: [closed]
    branches: ["main"]

jobs:
  if_merged:
    if: github.event.pull_request.merged
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"
      REACT_APP_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.REACT_APP_CONTENTFUL_ACCESS_TOKEN }}
      REACT_APP_CONTENTFUL_CMA_ACCESS_TOKEN: ${{ secrets.REACT_APP_CONTENTFUL_CMA_ACCESS_TOKEN }}
      REACT_APP_CONTENTFUL_ENVIRONMENT: ${{ secrets.REACT_APP_CONTENTFUL_ENVIRONMENT }}
      REACT_APP_CONTENTFUL_PREVIEW_ACCESS_TOKEN: ${{ secrets.REACT_APP_CONTENTFUL_PREVIEW_ACCESS_TOKEN }}
      REACT_APP_CONTENTFUL_SPACE_ID: ${{ secrets.REACT_APP_CONTENTFUL_SPACE_ID }}
      REACT_APP_COGNITO_USER_POOL_ID: ${{ secrets.REACT_APP_COGNITO_USER_POOL_ID }}
      REACT_APP_COGNITO_CLIENT_ID: ${{ secrets.REACT_APP_COGNITO_CLIENT_ID }}
      REACT_APP_PLAYER_API_URL: ${{ secrets.REACT_APP_PLAYER_API_URL }}

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn sync
      - run: yarn invalidate
